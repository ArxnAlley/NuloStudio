<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SkyGrid Wx</title>

    <link rel="icon" type="image/png" href="SG_Favicon.png">

    <link rel="apple-touch-icon" href="SG_Favicon.png">
    
    <!-- Orbitron: geometric digital-panel font for the clock -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styleIndex.css">

  </head>

  <body>

    <!-- ============================================================
         HEADER
    ============================================================= -->
    
    <header id="mainHeader">

      <!-- LEFT: Logo → separator → location -->
      
      <div id="headerLeft">
      
        <a id="siteLogoLink" href="index.html"><img src="logos/TPSkyGridLogo.png" id="siteLogo" alt="SkyGrid Wx"></a>
      
        <div class="navSep"></div>
      
        <span id="headerLocation">Wheelersburg, OH</span>
      
      </div>

      <!-- CENTER: Digital clock -->
      
      <div id="clockDisplay">
      
        <div id="clockTimeWrap">
      
          <span id="clockTime">12:00:00</span>
      
          <span id="clockAmPm">AM</span>
      
        </div>
      
        <span id="clockDate">Loading&hellip;</span>
      
      </div>

      <!-- RIGHT: Burger -->

      <div id="headerRight"></div>

    </header>

    <div id="editControls">
      
      <button id="editConfirm">✔</button>
      
      <button id="editCancel">✕</button>
      
      <button id="editReset">RESET</button>
    
    </div>


    <!-- ============================================================
         MAIN DASHBOARD
    ============================================================= -->
    
    <main id="dashContent">

      <!-- ============================================================
           TOP ROW
      ============================================================= -->
      
      <div id="topRow">

        <!-- TOP LEFT: YouTube Stream Panel -->
      
        <section id="youtubePanel" class="quadrant glassPanel">

          <div id="youtubeEmbed">
      
            <!--
              YouTube Live Stream
              ─────────────────────────────────────────────────────
              Source is controlled dynamically via Worker.

              Worker handles:
                - Live stream or fallback videoId

              Frontend updates iframe source at runtime.
            -->
      
            <iframe
      
              id="youtubeQuadrantIframe"
        
              src="https://www.youtube.com/embed/live_stream?channel=UCNMbegBD9OjH4Eza8vVjBMg&autoplay=1&mute=1&rel=0&modestbranding=1"
        
              allow="autoplay; encrypted-media; picture-in-picture"
        
              allowfullscreen
        
              frameborder="0"
        
              title="Weather Stream"
        
            ></iframe>
        
          </div>

          <!-- Right-side vertical control bar -->
          
          <div id="youtubeControlBar">

            <div class="profileBtnGroup">

              <button

                id="btnRyanHall"

                class="profileBtn"

                title="Ryan Hall Y'all"

                onclick="switchYoutubeSource('ryanHall')">

                <div class="profileAvatar">RH</div>

              </button>

              <span class="profileLabel">Ryan Hall</span>

            </div>

            <div class="profileBtnGroup">

              <button

                id="btnYallBot"

                class="profileBtn active"

                title="Y'allBot"

                onclick="switchYoutubeSource('yallBot')">

                <div class="profileAvatar">YB</div>

              </button>

              <span class="profileLabel">Y'allBot</span>

            </div>

            <button

              id="btnExpandTop"

              class="expandBtn"

              title="Expand stream"

              onclick="toggleTopPanelExpand()">

              <span id="expandTopArrow" class="arrowIcon">&#10095;</span>

            </button>

            <button

              id="btnExpandBottomAlt"

              class="expandBtn"

              title="Expand cam view"

              onclick="toggleBottomPanelExpand()">

              <span class="arrowIcon">&#10094;</span>

            </button>

          </div>
        
        </section>

        <!-- TOP RIGHT: Hourly Forecast Panel -->
        
        <section id="forecastPanel" class="quadrant glassPanel">

          <div class="panelHeader">
        
            <span class="panelTitle">Hourly Forecast</span>
        
          </div>

          <div id="hourlyForecastContainer">
            
            <div class="hourlyRow" id="hourlyTopRow"></div>
            
            <div class="hourlyRow" id="hourlyBottomRow"></div>
          
          </div>

        </section>

      </div>

      <!-- ============================================================
           BOTTOM ROW
      ============================================================= -->
    
      <div id="bottomRow">

        <!-- BOTTOM LEFT: Weather Stats Panel -->
    
        <section id="statsPanel" class="quadrant glassPanel">

          <div class="panelHeader">
    
            <span class="panelTitle">Current Conditions</span>
    
            <span id="lastUpdated">&mdash;</span>
    
          </div>

          <div id="statsGrid">

            <div class="statCard" id="statTemp">
    
              <div class="statValue" id="valTemp">&mdash;</div>
    
              <div class="statLabel">Temperature</div>
    
            </div>

            <div class="statCard" id="statWind">

              <div class="statValue" id="valWind">&mdash;</div>

              <div class="statLabel">Wind Speed</div>

              <div class="statSub" id="valWindGust"></div>

            </div>

            <div class="statCard" id="statRain">

              <div class="statValue" id="valRain">&mdash;</div>

              <div class="statLabel"><span id="valRainIntensity"></span>Rain Chance</div>

              <div class="statSub" id="valRainNext"></div>

            </div>

            <div class="statCard" id="statCondition">
    
              <div class="statIcon" id="valConditionIcon">&mdash;</div>
    
              <div class="statValueSub" id="valConditionText">Loading&hellip;</div>
    
              <div class="statLabel">Condition</div>
    
            </div>

            <div class="statCard" id="statSunrise">
    
              <div class="statValue" id="valSunrise">&mdash;</div>
    
              <div class="statLabel">Sunrise</div>
    
            </div>

            <div class="statCard" id="statSunset">
    
              <div class="statValue" id="valSunset">&mdash;</div>
    
              <div class="statLabel">Sunset</div>
    
            </div>

          </div>

        </section>


        <!-- BOTTOM RIGHT: Weather Cam Panel -->
    
        <section id="camPanel" class="quadrant glassPanel">

          <!-- Left-side vertical control bar -->
    
          <div id="camControlBar">
    
            <button
    
              id="btnExpandBottom"
      
              class="expandBtn"
      
              title="Expand cam view"
      
              onclick="toggleBottomPanelExpand()">
              
              <span id="expandBottomArrow" class="arrowIcon">&#10094;</span>
            
            </button>
          
          </div>

          <div id="camMain">

            <div class="panelHeader">
      
              <span class="panelTitle">Weather Cam</span>
      
              <span id="camStatus">Offline</span>
      
            </div>

            <div id="camView">
      
              <!--
                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                WEBCAM INTEGRATION
                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                Configure CAM_STREAM_URL in js/indexJS.js

                Supports:
                  - Direct video stream (MP4/WebM)
                  - MJPEG (image stream)
                  - HLS (.m3u8 via hls.js)
                  - Backend proxy endpoint
                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              -->
      
              <video id="camFeed" autoplay muted playsinline></video>

              <div id="camPlaceholder">
      
                <div id="camPlaceholderIcon">&#9673;</div>
      
                <div id="camPlaceholderText">Weather Cam</div>
      
                <div id="camPlaceholderSub">Stream not configured</div>
      
              </div>
      
            </div>

          </div>

        </section>

      </div>

    </main>

    <button id="hamburgerBtn" aria-label="Menu">
      
      <svg id="hamburgerSvg" width="32" height="28" viewBox="0 0 32 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      
        <rect x="0" y="0" width="32" height="2" fill="white"/>
      
        <rect id="hamMidBar" x="0" y="13" width="18" height="2" fill="white"/>
      
        <polygon id="hamArrow" points="21,9 30,14 21,19" fill="white"/>
      
        <rect x="0" y="26" width="32" height="2" fill="white"/>
      
      </svg>
    
    </button>

    <div id="slidePanel">
    
      <div id="slidePanelInner">
    
        <div id="menuLinks">
    
          <button id="layoutBtn"><span>Edit Layout</span></button>
    
          <button id="radarToggleBtn"><span>Radar</span></button>
    
          <div id="bgModeGroup">
    
            <span id="bgModeLabel">Background <span id="bgModeSub">(Choose Your BG Style)</span></span>
      
            <label class="bgModeOption">
      
              <input type="radio" name="bgMode" value="static" checked>
      
              <span class="bgModeText">Static (Default)</span>
      
            </label>
      
            <label class="bgModeOption">
      
              <input type="radio" name="bgMode" value="weather">
      
              <span class="bgModeText">Weather Based</span>
      
            </label>
      
            <label class="bgModeOption">
      
              <input type="radio" name="bgMode" value="time">
      
              <span class="bgModeText">Time of Day</span>
      
            </label>
      
          </div>
      
        </div>
      
      </div>
    
    </div>
    
    <div id="slideOverlay"></div>

    <div id="alertBanner"></div>

    <!-- ============================================================
         RADAR OVERLAY
    ============================================================= -->

    <div id="radarOverlay">

      <div id="radarMap"></div>

      <button id="radarLocateBtn" title="Zoom to Wheelersburg, OH">
        
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        
        </svg>
      
      </button>

      <div id="conditionsHud"></div>

      <div id="radarAlertTicker"></div>

    </div>

    <script src="js/indexJS.js" defer></script>

  </body>

</html>
